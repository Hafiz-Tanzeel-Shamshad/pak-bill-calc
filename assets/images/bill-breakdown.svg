<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="system-ui, sans-serif">
  <rect width="800" height="450" fill="#f8faf9" rx="8"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f1a1f">What Makes Up Your Electricity Bill?</text>
  <g transform="translate(60,60)">
    <rect x="0" y="0" width="580" height="36" fill="#0f7a7a" rx="4"><title>Energy Charges – 62%</title></rect>
    <text x="12" y="24" font-size="13" fill="#fff" font-weight="600">Energy Charges (Slab Rates)</text>
    <text x="560" y="24" text-anchor="end" font-size="13" fill="#fff" font-weight="600">62%</text>
    <rect x="0" y="42" width="160" height="36" fill="#f4b740" rx="4"><title>GST – 18%</title></rect>
    <text x="12" y="66" font-size="13" fill="#0f1a1f" font-weight="600">GST (18%)</text>
    <text x="150" y="66" text-anchor="end" font-size="13" fill="#0f1a1f" font-weight="600">18%</text>
    <rect x="0" y="84" width="130" height="36" fill="#e86a58" rx="4"><title>Income Tax – 12%</title></rect>
    <text x="12" y="108" font-size="13" fill="#fff" font-weight="600">Income Tax</text>
    <text x="120" y="108" text-anchor="end" font-size="13" fill="#fff" font-weight="600">12%</text>
    <rect x="0" y="126" width="100" height="36" fill="#4d5c66" rx="4"><title>Fixed Charges – 5%</title></rect>
    <text x="12" y="150" font-size="13" fill="#fff" font-weight="600">Fixed Charges</text>
    <text x="90" y="150" text-anchor="end" font-size="13" fill="#fff" font-weight="600">5%</text>
    <rect x="0" y="168" width="28" height="36" fill="#2196a0" rx="4"><title>NJ Surcharge – 1%</title></rect>
    <text x="12" y="192" font-size="13" fill="#fff" font-weight="600">NJ</text>
    <rect x="34" y="168" width="28" height="36" fill="#567d92" rx="4"><title>FC Surcharge – 1%</title></rect>
    <text x="46" y="192" font-size="12" fill="#fff" font-weight="600">FC</text>
    <rect x="68" y="168" width="28" height="36" fill="#9e9e9e" rx="4"><title>TV Fee – 1%</title></rect>
    <text x="80" y="192" font-size="12" fill="#fff" font-weight="600">TV</text>
  </g>
</svg>
