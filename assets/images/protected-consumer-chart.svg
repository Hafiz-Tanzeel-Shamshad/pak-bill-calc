<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="system-ui, sans-serif">
  <rect width="800" height="400" fill="#f8faf9" rx="8"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f1a1f">Protected vs Non-Protected – 200 Unit Bill Comparison</text>
  <g transform="translate(100,80)">
    <rect x="0" y="80" width="200" height="200" fill="#0f7a7a" rx="6"/>
    <text x="100" y="160" text-anchor="middle" font-size="13" fill="#fff">Protected</text>
    <text x="100" y="180" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">Rs 2,355</text>
    <text x="100" y="200" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">@ 10.54–13.01/unit</text>
    <rect x="300" y="20" width="200" height="260" fill="#e86a58" rx="6"/>
    <text x="400" y="100" text-anchor="middle" font-size="13" fill="#fff">Non-Protected</text>
    <text x="400" y="130" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">Rs 5,135</text>
    <text x="400" y="150" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">@ 22.44–28.91/unit</text>
    <line x1="220" y1="150" x2="290" y2="150" stroke="#4d5c66" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="255" y="140" text-anchor="middle" font-size="11" fill="#4d5c66">2.2x</text>
  </g>
</svg>
